{% extends "base.html" %}

{% block content %}
<style>
    .my-products-container {
        padding: 20px 0;
    }
    .catalog-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
    }
    .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 25px;
    }
    .product-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        display: flex;
        flex-direction: column; /* Выравниваем контент вертикально */
        height: 100%; /* Карточки будут одной высоты в ряду */
        transition: transform 0.2s, border-color 0.2s;
    }
    .product-card:hover {
        transform: translateY(-5px);
        border-color: var(--primary);
    }
    .card-img {
        height: 160px;
        width: 100%;
        object-fit: cover;
        border-bottom: 1px solid var(--border);
    }
    .card-body {
        padding: 18px;
        display: flex;
        flex-direction: column;
        flex-grow: 1; /* Позволяет телу карточки растягиваться */
    }
    .card-category {
        font-size: 11px;
        text-transform: uppercase;
        color: var(--primary);
        letter-spacing: 1px;
        margin-bottom: 8px;
        font-weight: 700;
    }
    .card-title {
        font-size: 16px;
        font-weight: 600;
        line-height: 1.4;
        margin-bottom: 12px;
        color: #fff;
        /* Ограничиваем текст 2 строками, чтобы ничего не ехало */
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        min-height: 44px; 
    }
    .card-price {
        font-size: 20px;
        font-weight: 800;
        color: #fff;
        margin-bottom: 20px;
    }
    .card-actions {
        margin-top: auto; /* ПРИЖИМАЕТ КНОПКИ К НИЗУ */
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }
    .btn-view {
        background: #333;
        color: #fff;
        text-align: center;
        padding: 10px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
        transition: 0.2s;
    }
    .btn-view:hover { background: #444; }
    
    .btn-delete {
        background: rgba(220, 53, 69, 0.1);
        color: #dc3545;
        border: 1px solid rgba(220, 53, 69, 0.2);
        padding: 10px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        transition: 0.2s;
    }
    .btn-delete:hover {
        background: #dc3545;
        color: #fff;
    }
</style>

<div class="my-products-container">
    <div class="catalog-header">
        <h2><i class="fas fa-boxes"></i> Мои товары</h2>
        <a href="{{ url_for('sell') }}" class="btn btn-primary">
            <i class="fas fa-plus"></i> Выставить товар
        </a>
    </div>

    <div class="products-grid">
        {% for product in products %}
        <div class="product-card">
            <img src="{{ url_for('static', filename='product_images/' + product.image) }}" class="card-img">
            
            <div class="card-body">
                <span class="card-category">{{ product.category }}</span>
                <div class="card-title">{{ product.short_description }}</div>
                <div class="card-price">{{ product.price | format_price }}</div>
                
                <div class="card-actions">
                    <a href="{{ url_for('product_detail', product_id=product.id) }}" class="btn-view">
                        <i class="fas fa-eye"></i> Обзор
                    </a>
                    <form action="{{ url_for('delete_product', product_id=product.id) }}" method="POST" onsubmit="return confirm('Удалить этот товар?')">
                        <button type="submit" class="btn-delete" style="width: 100%;">
                            <i class="fas fa-trash"></i> Удалить
                        </button>
                    </form>
                </div>
            </div>
        </div>
        {% else %}
        <div class="empty-state" style="grid-column: 1/-1; text-align: center; padding: 60px; color: var(--text-sec);">
            <i class="fas fa-box-open" style="font-size: 48px; margin-bottom: 15px; opacity: 0.3;"></i>
            <p>У вас пока нет активных товаров.</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
